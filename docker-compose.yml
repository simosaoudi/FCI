services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: traffic
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic -d traffic"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

  spring-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: traffic-spring-backend:latest
    container_name: spring-backend
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: traffic
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
    healthcheck:
      test: ["CMD", "sh", "-lc", "test -f /app/app.jar"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

  sumo-adapter:
    build:
      context: ./sumo-adapter
      dockerfile: Dockerfile
    image: sumo-traffic-sumo-adapter:latest
    container_name: sumo-adapter
    depends_on:
      - spring-backend
    ports:
      - "8765:8765"
      - "8766:8766"
    volumes:
      - ./sumo-adapter:/app
    environment:
      SUMO_HOME: /usr/share/sumo
      PYTHONUNBUFFERED: "1"
    networks:
      - sumo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: traffic-angular-frontend:latest
    container_name: traffic-angular-frontend
    restart: unless-stopped
    depends_on:
      - spring-backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "sh", "-lc", "test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

networks:
  sumo-net:
    driver: bridge

volumes:
  postgres_data:
