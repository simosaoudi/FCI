services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sumo-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak/realm-traffic.json:/opt/keycloak/data/import/realm-traffic.json:ro
    networks:
      - sumo-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-lc", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: traffic
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic -d traffic"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

  spring-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: traffic-spring-backend:latest
    container_name: spring-backend
    depends_on:
      - kafka
      - postgres
      - keycloak
    ports:
      - "8081:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TRAFFIC_SNAPSHOT: traffic.snapshot
      KAFKA_TOPIC_SIMULATION_CONTROL: simulation.control
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: traffic
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
    healthcheck:
      test: ["CMD", "sh", "-lc", "test -f /app/app.jar"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

  sumo-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    image: sumo-traffic-sumo-adapter:latest
    container_name: sumo-adapter
    depends_on:
      - kafka
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    environment:
      SUMO_HOME: /usr/share/sumo
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TRAFFIC_SNAPSHOT: traffic.snapshot
      KAFKA_TOPIC_SIMULATION_CONTROL: simulation.control
    networks:
      - sumo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: traffic-angular-frontend:latest
    container_name: traffic-angular-frontend
    restart: unless-stopped
    depends_on:
      - spring-backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "sh", "-lc", "test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sumo-net

networks:
  sumo-net:
    driver: bridge

volumes:
  postgres_data:
