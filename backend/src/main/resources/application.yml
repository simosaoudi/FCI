server:
  port: 8080

spring:
  application:
    name: traffic-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:traffic}
    username: ${POSTGRES_USER:traffic}
    password: ${POSTGRES_PASSWORD:traffic}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
