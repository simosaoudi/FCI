<div class="home-container">
  <h1 class="home-title">Tableau de Bord Trafic</h1>
  <div class="tiles-grid">
    <div class="tile" *ngFor="let tile of tiles" [routerLink]="tile.route" [style.border-left-color]="tile.accent">
      <h3 class="tile-title">{{ tile.title }}</h3>
      <p class="tile-subtitle">{{ tile.subtitle }}</p>
    </div>
  </div>
</div>
